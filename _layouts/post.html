---
layout: default.html
--- 

<link rel=stylesheet href={{ "/assets/css/post.css"  }} />
<h1 id="title-post">{{ title }}</h1>
<date datetime={{ page.date }}>
  <i>Published on </i> {{ page.date | date: "%d %B %y" }}
</date>

<link rel="stylesheet"  href={{ "/assets/css/toc.css" }} />
<div id="toc">
  <div id="toc-title">Contents</div>
  {{ content | toc }}
</div>

<article>
  {{ content }}
</article>

<script src={{ "/assets/js/footnotes.js" }}></script>
